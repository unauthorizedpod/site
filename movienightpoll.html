<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Movie Night Poll</title>
  <link href="https://fonts.googleapis.com/css2?family=Special+Elite&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000;
      color: #fff;
      font-family: 'Special Elite', 'Courier New', Courier, monospace;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .container {
      width: 100%;
      max-width: 560px;
    }

    .question {
      font-size: clamp(1.2rem, 3vw, 1.6rem);
      line-height: 1.5;
      letter-spacing: 0.04em;
      margin-bottom: 40px;
      border-bottom: 1px solid #fff;
      padding-bottom: 24px;
    }

    .days {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 16px;
      margin-bottom: 48px;
    }

    .day-item {
      display: flex;
      align-items: center;
      gap: 16px;
      cursor: pointer;
    }

    .day-item input[type="checkbox"] {
      appearance: none;
      -webkit-appearance: none;
      width: 20px;
      height: 20px;
      border: 1px solid #fff;
      background: #000;
      cursor: pointer;
      flex-shrink: 0;
      position: relative;
      transition: background 0.15s;
    }

    .day-item input[type="checkbox"]:checked {
      background: #fff;
    }

    .day-item input[type="checkbox"]:checked::after {
      content: '';
      position: absolute;
      top: 3px;
      left: 7px;
      width: 5px;
      height: 10px;
      border: 2px solid #000;
      border-top: none;
      border-left: none;
      transform: rotate(45deg);
    }

    .day-label {
      font-size: 1.15rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      user-select: none;
    }

    .submit-btn {
      background: #000;
      color: #fff;
      border: 1px solid #fff;
      font-family: 'Special Elite', 'Courier New', Courier, monospace;
      font-size: 1rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 14px 40px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      display: block;
    }

    .submit-btn:hover {
      background: #fff;
      color: #000;
    }

    .error-msg {
      margin-top: 16px;
      font-size: 0.85rem;
      letter-spacing: 0.06em;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .error-msg.visible {
      opacity: 1;
    }
  </style>
</head>
<body>
  <div class="container">
    <p class="question">What day(s) of the week is best for movie nights?</p>
    <ul class="days" id="daysList">
      <li class="day-item"><input type="checkbox" id="mon" value="Monday"><label class="day-label" for="mon">Monday</label></li>
      <li class="day-item"><input type="checkbox" id="tue" value="Tuesday"><label class="day-label" for="tue">Tuesday</label></li>
      <li class="day-item"><input type="checkbox" id="wed" value="Wednesday"><label class="day-label" for="wed">Wednesday</label></li>
      <li class="day-item"><input type="checkbox" id="thu" value="Thursday"><label class="day-label" for="thu">Thursday</label></li>
      <li class="day-item"><input type="checkbox" id="fri" value="Friday"><label class="day-label" for="fri">Friday</label></li>
      <li class="day-item"><input type="checkbox" id="sat" value="Saturday"><label class="day-label" for="sat">Saturday</label></li>
      <li class="day-item"><input type="checkbox" id="sun" value="Sunday"><label class="day-label" for="sun">Sunday</label></li>
    </ul>
    <button class="submit-btn" id="submitBtn">Submit</button>
    <p class="error-msg" id="errorMsg">— please select at least one day —</p>
  </div>

  <script>
    const DAYS = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];

    document.getElementById('submitBtn').addEventListener('click', () => {
      const checked = DAYS.filter(d => document.getElementById(d.slice(0,3).toLowerCase()).checked);
      const errEl = document.getElementById('errorMsg');

      if (checked.length === 0) {
        errEl.classList.add('visible');
        return;
      }
      errEl.classList.remove('visible');

      // Load existing votes from sessionStorage (shared between pages in same tab)
      const stored = sessionStorage.getItem('pollVotes');
      const votes = stored ? JSON.parse(stored) : {};
      DAYS.forEach(d => { if (!votes[d]) votes[d] = 0; });
      checked.forEach(d => { votes[d]++; });
      sessionStorage.setItem('pollVotes', JSON.stringify(votes));
      sessionStorage.setItem('pollSubmitted', '1');

      window.location.href = 'results.html';
    });
  </script>
</body>
</html>
