<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Night Poll</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Courier+Prime&display=swap');

        /* Reset and Base Styles */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: black;
            color: white;
            font-family: 'Courier Prime', 'Courier New', monospace;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            line-height: 1.6;
        }

        .container {
            max-width: 500px;
            width: 100%;
        }

        h1 {
            font-size: 1.25rem;
            font-weight: normal;
            margin-bottom: 2.5rem;
            line-height: 1.4;
        }

        /* Poll Options */
        .options-group {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .option {
            display: flex;
            align-items: center;
            cursor: pointer;
            user-select: none;
            transition: opacity 0.2s;
        }

        .option:hover {
            opacity: 0.7;
        }

        .box {
            width: 22px;
            height: 22px;
            border: 1px solid white;
            margin-right: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .option.selected .box::after {
            content: '';
            width: 10px;
            height: 10px;
            background-color: white;
        }

        .day-label {
            font-size: 1.1rem;
        }

        /* Submit Button */
        #submit-btn {
            margin-top: 3rem;
            background: transparent;
            color: white;
            border: none;
            border-bottom: 1px solid white;
            font-family: inherit;
            font-size: 1.1rem;
            padding-bottom: 4px;
            cursor: pointer;
            opacity: 0.2;
            pointer-events: none;
            transition: opacity 0.3s, border-color 0.3s;
        }

        #submit-btn.ready {
            opacity: 1;
            pointer-events: auto;
        }

        #submit-btn:hover {
            border-bottom-color: transparent;
        }

        /* Utilities */
        .hidden {
            display: none;
        }

        #status-msg {
            font-size: 1.1rem;
            animation: fadein 1s;
        }

        @keyframes fadein {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Main Form -->
        <div id="poll-content">
            <h1>Which days of the week are best for a 7:00 movie?</h1>
            
            <div id="days-container" class="options-group">
                <!-- Generated by JavaScript -->
            </div>

            <button id="submit-btn">Submit</button>
        </div>

        <!-- Success Message -->
        <div id="success-content" class="hidden">
            <p id="status-msg">Thank you.</p>
        </div>
    </div>

    <script>
        const days = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
        const selectedDays = new Set();
        const STORAGE_KEY = 'movie_poll_v1_submitted';
        
        const pollContent = document.getElementById('poll-content');
        const successContent = document.getElementById('success-content');
        const daysContainer = document.getElementById('days-container');
        const submitBtn = document.getElementById('submit-btn');

        // 1. Check if user already voted
        if (localStorage.getItem(STORAGE_KEY)) {
            showSuccess();
        }

        // 2. Render Days
        days.forEach(day => {
            const div = document.createElement('div');
            div.className = 'option';
            div.innerHTML = `
                <div class="box"></div>
                <span class="day-label">${day}</span>
            `;
            div.onclick = () => toggleDay(day, div);
            daysContainer.appendChild(div);
        });

        // 3. Selection Logic
        function toggleDay(day, element) {
            if (selectedDays.has(day)) {
                selectedDays.delete(day);
                element.classList.remove('selected');
            } else {
                selectedDays.add(day);
                element.classList.add('selected');
            }
            updateButtonState();
        }

        function updateButtonState() {
            if (selectedDays.size > 0) {
                submitBtn.classList.add('ready');
            } else {
                submitBtn.classList.remove('ready');
            }
        }

        function showSuccess() {
            pollContent.classList.add('hidden');
            successContent.classList.remove('hidden');
        }

        // 4. Submission Logic
        submitBtn.onclick = async () => {
            if (selectedDays.size === 0) return;

            submitBtn.innerText = 'Submitting...';
            submitBtn.classList.remove('ready');

            const selections = Array.from(selectedDays).join(', ');

            try {
                // Submit to Formspree
                const response = await fetch('https://formspree.io/f/zjdomes@gmail.com', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        question: "Which days of the week are best for a 7:00 movie?",
                        results: selections
                    })
                });

                if (response.ok) {
                    localStorage.setItem(STORAGE_KEY, 'true');
                    showSuccess();
                } else {
                    throw new Error('Server error');
                }
            } catch (err) {
                console.error(err);
                submitBtn.innerText = 'Error. Try again?';
                submitBtn.classList.add('ready');
            }
        };
    </script>
</body>
</html>
