<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Movie Night Poll</title>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f7f5f2;
      --surface: #ffffff;
      --text: #1a1a1a;
      --muted: #888;
      --accent: #2c2c2c;
      --check: #3a3a3a;
      --border: #e0ddd8;
      --hover: #f0ede8;
      --selected-bg: #1a1a1a;
      --selected-text: #ffffff;
      --btn: #1a1a1a;
      --btn-hover: #333;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 3rem 2.5rem;
      max-width: 480px;
      width: 100%;
      animation: fadeUp 0.5s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .eyebrow {
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1rem;
    }

    h1 {
      font-family: 'Lora', serif;
      font-size: 1.5rem;
      font-weight: 600;
      line-height: 1.4;
      margin-bottom: 0.5rem;
    }

    .subtext {
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 2rem;
      font-weight: 300;
    }

    .options {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      margin-bottom: 2rem;
    }

    .option {
      display: flex;
      align-items: center;
      gap: 0.85rem;
      padding: 0.75rem 1rem;
      border: 1px solid var(--border);
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      user-select: none;
    }

    .option:hover {
      background: var(--hover);
    }

    .option.selected {
      background: var(--selected-bg);
      border-color: var(--selected-bg);
      color: var(--selected-text);
    }

    .option input[type="checkbox"] {
      display: none;
    }

    .box {
      width: 18px;
      height: 18px;
      border: 1.5px solid var(--border);
      border-radius: 4px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, border-color 0.15s;
      background: transparent;
    }

    .option.selected .box {
      background: #fff;
      border-color: #fff;
    }

    .box svg {
      display: none;
      width: 11px;
      height: 11px;
    }

    .option.selected .box svg {
      display: block;
    }

    .label {
      font-size: 0.95rem;
      font-weight: 400;
    }

    .submit-btn {
      width: 100%;
      padding: 0.85rem;
      background: var(--btn);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
      letter-spacing: 0.01em;
    }

    .submit-btn:hover:not(:disabled) {
      background: var(--btn-hover);
    }

    .submit-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .status {
      margin-top: 1rem;
      font-size: 0.85rem;
      color: var(--muted);
      text-align: center;
      min-height: 1.2em;
    }

    .status.success { color: #3a7d44; }
    .status.error   { color: #b94040; }

    /* Thank you state */
    .thank-you {
      display: none;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 1rem;
      animation: fadeUp 0.4s ease both;
    }

    .thank-you .icon {
      font-size: 2.5rem;
    }

    .thank-you h2 {
      font-family: 'Lora', serif;
      font-size: 1.3rem;
      font-weight: 600;
    }

    .thank-you p {
      font-size: 0.9rem;
      color: var(--muted);
      font-weight: 300;
    }

    .poll-body.hidden { display: none; }
    .thank-you.visible { display: flex; }

    @media (max-width: 480px) {
      .card { padding: 2rem 1.5rem; }
    }
  </style>
</head>
<body>
<div class="card">

  <!-- Poll -->
  <div class="poll-body" id="pollBody">
    <p class="eyebrow">Quick Poll</p>
    <h1>Which day(s) of the week work best for movie nights?</h1>
    <p class="subtext">Select all that apply.</p>

    <div class="options" id="options">
      <!-- Days rendered by JS -->
    </div>

    <button class="submit-btn" id="submitBtn" disabled>Submit</button>
    <p class="status" id="status"></p>
  </div>

  <!-- Thank you -->
  <div class="thank-you" id="thankYou">
    <div class="icon">🎬</div>
    <h2>Thanks for responding!</h2>
    <p>Your answer has been recorded.</p>
  </div>

</div>

<script>
  // ─── CONFIG ────────────────────────────────────────────────────────────────
  const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwyykR2vp8Ae4w0QSF9WdtlBJWKvZE4uVaWBKnJrHPZbtyw9mHDVOVL3xSzm70jQ3pVcg/exec";
  // ───────────────────────────────────────────────────────────────────────────

  const days = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
  const selected = new Set();

  const optionsEl  = document.getElementById("options");
  const submitBtn  = document.getElementById("submitBtn");
  const statusEl   = document.getElementById("status");
  const pollBody   = document.getElementById("pollBody");
  const thankYou   = document.getElementById("thankYou");

  // Build options
  days.forEach(day => {
    const div = document.createElement("div");
    div.className = "option";
    div.innerHTML = `
      <span class="box">
        <svg viewBox="0 0 12 12" fill="none" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="1.5,6 4.5,9 10.5,3"/>
        </svg>
      </span>
      <span class="label">${day}</span>
    `;
    div.addEventListener("click", () => {
      if (selected.has(day)) {
        selected.delete(day);
        div.classList.remove("selected");
      } else {
        selected.add(day);
        div.classList.add("selected");
      }
      submitBtn.disabled = selected.size === 0;
    });
    optionsEl.appendChild(div);
  });

  // Submit
  submitBtn.addEventListener("click", async () => {
    if (selected.size === 0) return;

    submitBtn.disabled = true;
    statusEl.textContent = "Submitting…";
    statusEl.className = "status";

    const payload = { days: [...selected].join(", ") };

    try {
      const formData = new FormData();
      formData.append("days", [...selected].join(", "));

      await fetch(APPS_SCRIPT_URL, {
        method: "POST",
        mode: "no-cors",
        body: formData,
      });

      pollBody.classList.add("hidden");
      thankYou.classList.add("visible");
    } catch (err) {
      statusEl.textContent = "Something went wrong. Please try again.";
      statusEl.className = "status error";
      submitBtn.disabled = false;
    }
  });
</script>
</body>
</html>
