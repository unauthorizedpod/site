<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Night Poll</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: black;
            color: white;
            font-family: 'Courier Prime', 'Courier New', monospace;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 24px;
        }

        .container {
            max-width: 450px;
            width: 100%;
        }

        h1 {
            font-size: 1.25rem;
            line-height: 1.5;
            margin-bottom: 32px;
            font-weight: normal;
        }

        .days-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 40px;
        }

        .day-item {
            display: flex;
            align-items: center;
            gap: 16px;
            cursor: pointer;
            user-select: none;
        }

        .checkbox {
            width: 20px;
            height: 20px;
            border: 1px solid white;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .checkbox-inner {
            width: 10px;
            height: 10px;
            background-color: white;
            display: none;
        }

        input[type="checkbox"]:checked + .checkbox .checkbox-inner {
            display: block;
        }

        input[type="checkbox"] {
            display: none;
        }

        .day-label {
            font-size: 1.125rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        button {
            background: none;
            border: none;
            color: white;
            font-family: inherit;
            font-size: 1.125rem;
            text-decoration: underline;
            text-underline-offset: 8px;
            cursor: pointer;
            padding: 0;
            transition: opacity 0.2s;
        }

        button:hover:not(:disabled) {
            opacity: 0.6;
        }

        button:disabled {
            opacity: 0.2;
            cursor: not-allowed;
        }

        #thank-you {
            display: none;
            font-size: 1.125rem;
        }

        #poll-form {
            display: none;
        }

        .loading-state {
            opacity: 0.5;
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="loading" class="loading-state">Initializing...</div>
        <div id="thank-you">Thank you.</div>

        <form id="poll-form">
            <h1>Which days of the week are best for a 7:00 movie?</h1>
            
            <div class="days-list" id="days-container">
                <!-- Days injected by script -->
            </div>

            <button type="submit" id="submit-btn" disabled>Submit</button>
        </form>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, addDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = JSON.parse(__firebase_config);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'movie-poll-v3';
        
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const DAYS = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
        const pollForm = document.getElementById('poll-form');
        const thankYou = document.getElementById('thank-you');
        const loading = document.getElementById('loading');
        const daysContainer = document.getElementById('days-container');
        const submitBtn = document.getElementById('submit-btn');

        let selectedDays = [];

        DAYS.forEach(day => {
            const label = document.createElement('label');
            label.className = 'day-item';
            label.innerHTML = `
                <input type="checkbox" value="${day}">
                <div class="checkbox"><div class="checkbox-inner"></div></div>
                <span class="day-label">${day}</span>
            `;
            
            label.querySelector('input').addEventListener('change', (e) => {
                if (e.target.checked) {
                    selectedDays.push(day);
                } else {
                    selectedDays = selectedDays.filter(d => d !== day);
                }
                submitBtn.disabled = selectedDays.length === 0;
            });

            daysContainer.appendChild(label);
        });

        async function init() {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }

                onAuthStateChanged(auth, async (user) => {
                    if (user) {
                        const voteDoc = await getDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'submission', 'status'));
                        loading.style.display = 'none';
                        if (voteDoc.exists()) {
                            thankYou.style.display = 'block';
                        } else {
                            pollForm.style.display = 'block';
                        }
                    }
                });
            } catch (error) {
                loading.innerText = "Connection error.";
            }
        }

        pollForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const user = auth.currentUser;
            if (!user || selectedDays.length === 0) return;

            submitBtn.disabled = true;
            submitBtn.innerText = 'Submitting...';

            try {
                await setDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'submission', 'status'), {
                    votedAt: new Date().toISOString()
                });

                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'votes'), {
                    selections: selectedDays,
                    timestamp: new Date().toISOString()
                });

                pollForm.style.display = 'none';
                thankYou.style.display = 'block';
            } catch (err) {
                submitBtn.disabled = false;
                submitBtn.innerText = 'Submit';
            }
        });

        init();
    </script>
</body>
</html>
