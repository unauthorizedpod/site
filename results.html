<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Movie Night Results</title>
  <link href="https://fonts.googleapis.com/css2?family=Special+Elite&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #000;
      color: #fff;
      font-family: 'Special Elite', 'Courier New', Courier, monospace;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .container {
      width: 100%;
      max-width: 560px;
    }

    .heading {
      font-size: clamp(1.2rem, 3vw, 1.6rem);
      letter-spacing: 0.04em;
      margin-bottom: 8px;
    }

    .subheading {
      font-size: 0.8rem;
      letter-spacing: 0.1em;
      opacity: 0.5;
      margin-bottom: 40px;
      text-transform: uppercase;
    }

    .results-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 20px;
      margin-bottom: 48px;
    }

    .result-row {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .result-meta {
      display: flex;
      justify-content: space-between;
      font-size: 0.9rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .bar-track {
      width: 100%;
      height: 2px;
      background: #222;
      position: relative;
    }

    .bar-fill {
      height: 2px;
      background: #fff;
      width: 0%;
      transition: width 0.8s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .total-line {
      margin-top: 32px;
      padding-top: 20px;
      border-top: 1px solid #333;
      font-size: 0.78rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      opacity: 0.5;
    }

    .back-link {
      display: inline-block;
      margin-top: 36px;
      font-size: 0.85rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #fff;
      text-decoration: none;
      border-bottom: 1px solid #fff;
      padding-bottom: 2px;
      transition: opacity 0.2s;
    }

    .back-link:hover { opacity: 0.5; }

    .empty-msg {
      font-size: 0.9rem;
      letter-spacing: 0.06em;
      opacity: 0.5;
    }
  </style>
</head>
<body>
  <div class="container">
    <p class="heading">Results</p>
    <p class="subheading" id="totalLabel">—</p>
    <ul class="results-list" id="resultsList"></ul>
  </div>

  <script>
    const DAYS = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];

    const stored = sessionStorage.getItem('pollVotes');
    const votes = stored ? JSON.parse(stored) : null;

    const list = document.getElementById('resultsList');
    const totalLabel = document.getElementById('totalLabel');

    if (!votes) {
      list.innerHTML = '<li class="empty-msg">No votes recorded yet.</li>';
    } else {
      const totalVotes = Object.values(votes).reduce((a, b) => a + b, 0);
      const maxVotes = Math.max(...Object.values(votes), 1);

      totalLabel.textContent = `${totalVotes} vote${totalVotes !== 1 ? 's' : ''} cast`;

      DAYS.forEach(day => {
        const count = votes[day] || 0;
        const pct = Math.round((count / maxVotes) * 100);

        const li = document.createElement('li');
        li.className = 'result-row';
        li.innerHTML = `
          <div class="result-meta">
            <span>${day}</span>
            <span>${count}</span>
          </div>
          <div class="bar-track">
            <div class="bar-fill" data-pct="${pct}"></div>
          </div>
        `;
        list.appendChild(li);
      });

      // Animate bars in after paint
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          document.querySelectorAll('.bar-fill').forEach(el => {
            el.style.width = el.dataset.pct + '%';
          });
        });
      });
    }
  </script>
</body>
</html>
