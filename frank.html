<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stream — Hetchy Films</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #050505;
        }
        .hero-bg {
            background-color: #000;
            background-image: linear-gradient(to bottom, rgba(0,0,0,0.3), rgba(5,5,5,1));
        }
        /* Adjusted wrapper for Vimeo iFrame */
        .video-container {
            position: relative;
            padding-bottom: 41.86%; /* Maintains 2.39:1 aspect ratio */
            height: 0;
            overflow: hidden;
            max-width: 100%;
            background: #000;
        }
        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }

        /* Holographic Hover Effect for Buttons */
        .payment-btn {
            position: relative;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
        }
        .payment-btn:hover {
            background: #fff;
            color: #000;
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .border-thin {
            border: 1px solid rgba(255,255,255,0.1);
        }

        .logo-back {
            filter: grayscale(1) brightness(0.8);
            transition: all 0.5s ease;
        }
        .logo-back:hover {
            filter: grayscale(0) brightness(1);
            transform: scale(1.05);
        }
    </style>
</head>
<body class="text-white selection:bg-white selection:text-black min-h-screen flex flex-col">

    <!-- Header / Branding -->
    <nav class="p-6 md:p-10 flex justify-center">
        <span class="text-[10px] font-mono uppercase tracking-[0.5em] text-zinc-500">Now Streaming</span>
    </nav>

    <!-- Main Content -->
    <main class="flex-grow container mx-auto px-6 max-w-6xl">
        
        <!-- Video Player Section -->
        <div class="w-full mb-16">
            <div class="video-container shadow-[0_0_100px_rgba(0,0,0,0.8)] border-thin">
                <iframe src="https://player.vimeo.com/video/1185194080?badge=0&amp;autopause=0&amp;player_id=0&amp;app_id=58479" 
                        allow="autoplay; fullscreen; picture-in-picture; clipboard-write; encrypted-media; web-share" 
                        referrerpolicy="strict-origin-when-cross-origin" 
                        title="Frank's Not Here"></iframe>
            </div>
            <div class="mt-6 flex justify-between items-center text-[10px] font-mono text-zinc-600 uppercase tracking-widest">
                <span>Frank's Not Here (2025)</span>
                <span>Directed by Zach Domes</span>
            </div>
        </div>

        <!-- Support Section -->
        <section class="max-w-2xl mx-auto text-center space-y-10 pb-24">
            <div class="space-y-4">
                <h2 class="text-xl md:text-2xl font-light text-zinc-300 italic">
                    Although this short film is free to watch, the artist appreciates your support
                </h2>
                <div class="h-[1px] w-12 bg-zinc-800 mx-auto"></div>
            </div>

            <!-- Payment Icons -->
            <div class="flex flex-wrap justify-center gap-4">
                <!-- PayPal Placeholder -->
                <a href="#" class="payment-btn flex items-center gap-3 px-8 py-4 rounded-sm">
                    <svg class="w-5 h-5" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M20.067 8.478c.492.415.716 1.01.625 1.763-.443 3.656-2.583 5.617-6.42 5.885l-.26.018h-.128c-.287 0-.533.208-.574.492l-.76 5.17a.541.541 0 01-.534.463h-3.48a.46.46 0 01-.453-.526l.162-1.096.657-4.48c.041-.283.287-.492.574-.492h.536l.186-.003c.532-.016 1.053-.06 1.558-.135.534-.078 1.045-.2 1.528-.363 1.343-.45 2.164-1.286 2.45-2.52.285-1.233-.062-2.316-1.046-3.238-.857-.803-2.112-1.223-3.73-1.25h-5.228c-.287 0-.533.21-.574.493L3.58 20.47a.541.541 0 01-.534.464H.54A.541.541 0 010 20.406l2.366-16.14C2.408 3.984 2.653 3.774 2.94 3.774H9.7c2.195 0 3.844.475 4.93 1.41.97.834 1.42 1.95 1.34 3.313-.037.604-.19 1.15-.455 1.63a5.52 5.52 0 01-1.393 1.64 6.83 6.83 0 011.83-.456c1.613-.198 2.98-.946 4.105-2.243z"/>
                    </svg>
                    <span class="text-xs font-black uppercase tracking-[0.2em]">PayPal</span>
                </a>

                <!-- Apple Pay Placeholder -->
                <a href="#" class="payment-btn flex items-center gap-3 px-8 py-4 rounded-sm">
                    <svg class="w-5 h-5" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M17.05 20.28c-.96.95-2.03 2.11-3.24 2.11s-1.62-.77-3.13-.77c-1.5 0-1.97.74-3.11.77-1.14.03-2.14-1.02-3.1-2.08-1.96-2.16-3.44-6.11-1.44-9.51 1-1.69 2.76-2.75 4.67-2.78 1.44-.03 2.8 1 3.68 1 .88 0 2.53-1.26 4.23-1.08 1.69.17 3.01.88 3.86 2.05-3.32 1.99-2.78 6.13.06 7.3-.65 1.6-1.53 3.05-2.48 3.99zm-4.32-15.17c.75-.95 1.25-2.24 1.11-3.53-1.12.04-2.48.75-3.28 1.69-.72.83-1.35 2.16-1.18 3.41 1.25.1 2.52-.55 3.35-1.57z"/>
                    </svg>
                    <span class="text-xs font-black uppercase tracking-[0.2em]">Apple Pay</span>
                </a>
            </div>
        </section>
    </main>

    <!-- Footer with Logo Link -->
    <footer class="border-t border-white/5 py-16 mt-auto">
        <div class="container mx-auto px-6 text-center space-y-8">
            <a href="https://unauthorizedpod.com/hetchyfilms" class="inline-block group">
                <img 
                    src="https://i.postimg.cc/fW30PvCn/hetchyfilmslogo-bw.png" 
                    alt="Hetchy Films" 
                    class="logo-back w-32 mx-auto mb-4"
                >
                <div class="text-[10px] text-zinc-500 font-mono uppercase tracking-[0.3em] group-hover:text-white transition-colors">
                    Back to Portfolio
                </div>
            </a>
            
            <div>
                <p class="text-[9px] text-zinc-700 font-mono uppercase tracking-[0.4em]">&copy; <span id="year"></span> HETCHY FILMS — ALL RIGHTS RESERVED.</p>
            </div>
        </div>
    </footer>

    <script src="https://player.vimeo.com/api/player.js"></script>
    <script>
        document.getElementById('year').textContent = new Date().getFullYear();
    </script>

</body>
</html>
